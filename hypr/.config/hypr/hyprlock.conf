$font = JetBrainsMono Nerd Font Propo 
$font_bold = JetBrainsMono Nerd Font Propo Bold

general {
    hide_cursor = false
    fail_timeout = 1000
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor = DP-2
    path = $HOME/Pictures/wallpapers/mt_fuji.png
    blur_passes = 1
}

input-field {
    monitor = DP-2
    size = 300, 50
    outline_thickness = 1

    outer_color = rgba(128, 128, 128, 0.5)
    inner_color = rgba(0, 0, 0, 0.3)

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    rounding = 15

    font_family = $font
    placeholder_text = Input password
    fail_text = $PAMFAIL

    # uncomment if you wish to display a message during authentication
    check_text = Authenticating...
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg

    fail_text = Wrong password
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    # uncomment to use a letter instead of a dot to indicate the typed password
    dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 0.3

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, -30
    halign = center
    valign = center
}

# TIME
label {
    monitor = DP-2
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 90
    font_family = $font

    position = 0, 150
    halign = center
    valign = center
}

# DATE
label {
    monitor = DP-2
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 20
    font_family = $font

    position = 0, 60
    halign = center
    valign = center
}
