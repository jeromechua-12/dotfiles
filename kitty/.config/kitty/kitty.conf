#
# Kitty config
#

# theme 
include catppuccin-mocha.conf

# font
font_family      family="MesloLGS Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto

# cursor
cursor_shape block
shell_integration no-cursor

# close confirm
confirm_os_window_close 0

# opacity
background_opacity 1.0
